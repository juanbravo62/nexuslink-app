<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - NexusLink</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #020617;
    font-family: "Inter", sans-serif;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* LOGIN CONTAINER */
.login-container {
    width: 100%;
    max-width: 320px;
    padding: 20px;
    text-align: center;
    animation: fadeUp 0.8s ease;
    position: relative;
}

.logo {
    margin-bottom: -50px;
}

.logo img {
    width: 280px;
    filter: drop-shadow(0 0 12px rgba(34,197,94,0.5));
    animation: fadeZoom 0.8s ease;
}

h2 {
    margin-bottom: 15px;
    font-weight: 600;
    font-size: 18px;
    letter-spacing: 1px;
}

input {
    width: 65%;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #064e3b;
    background: #020617;
    color: white;
    outline: none;
}

button {
    width: 40%;
    padding: 14px;
    border-radius: 8px;
    border: none;
    background: #22c55e;
    color: black;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

button:hover { transform: scale(1.03); }

.erro {
    margin-top: 10px;
    color: #ef4444;
}

/* ANIMAÇÕES */
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeZoom {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}

.fade-out {
    opacity: 0;
    transform: scale(0.98);
    transition: all 0.4s ease;
}

/* LOADER */
.loader-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(2,6,23,0.95);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
    z-index: 999;
}

.loader-screen.active {
    opacity: 1;
    pointer-events: all;
}

.progress-circle {
    position: relative;
    width: 120px;
    height: 120px;
    animation: float 1.5s ease-in-out infinite;
}

@keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
}

.progress-circle svg {
    transform: rotate(-90deg);
    width: 100%;
    height: 100%;
    border-radius: 50%;
}

.progress-circle circle {
    fill: none;
    stroke-width: 8;
    stroke-linecap: round;
}

.progress-circle .bg {
    stroke: rgba(34,197,94,0.2);
}

.progress-circle .progress {
    stroke: #22c55e;
    stroke-dasharray: 377;
    stroke-dashoffset: 377;
    filter: drop-shadow(0 0 20px #22c55e);
    transition: stroke-dashoffset 0.25s linear;
}

.progress-circle span {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-weight: 600;
    color: #22c55e;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="login-container">
    <div class="logo">
        <img src="{{ url_for('static', filename='logo.png') }}">
    </div>

    <h2>Acessar Plataforma</h2>

    <form method="POST" onsubmit="animarSaida()">
        <input type="text" name="usuario" placeholder="Usuário" required>
        <input type="password" name="senha" placeholder="Senha" required>
        <button>Entrar</button>
    </form>

    {% if erro %}
    <div class="erro">{{ erro }}</div>
    {% endif %}
</div>

<!-- LOADER -->
<div class="loader-screen">
    <div class="progress-circle">
        <svg>
            <circle class="bg" cx="60" cy="60" r="60"></circle>
            <circle class="progress" cx="60" cy="60" r="60"></circle>
        </svg>
        <span id="progress">0%</span>
    </div>
</div>

<script>
function animarSaida() {
    event.preventDefault();

    const container = document.querySelector('.login-container');
    const loader = document.querySelector('.loader-screen');
    const progressCircle = document.querySelector('.progress-circle .progress');
    const progressText = document.getElementById('progress');

    container.classList.add('fade-out');

    setTimeout(() => {
        loader.classList.add('active');

        let percent = 0;
        const totalLength = 2 * Math.PI * 60;

        const interval = setInterval(() => {
            percent++;
            progressText.innerText = percent + "%";

            const offset = totalLength - (totalLength * percent / 100);
            progressCircle.style.strokeDashoffset = offset;

            // Glow dinamico
            progressCircle.style.filter = `drop-shadow(0 0 ${4 + percent/4}px #22c55e)`;

            if(percent >= 100) {
                clearInterval(interval);
                document.querySelector('form').submit();
            }
        }, 35); // velocidade
    }, 300);
}
</script>

</body>
</html>
